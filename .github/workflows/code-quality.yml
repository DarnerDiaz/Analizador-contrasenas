name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cryptography==41.0.7 --only-binary :all:
        pip install -r requirements-ci.txt
    
    - name: Lint with flake8
      run: flake8 utils/ app/ --max-line-length=120 --exit-zero
    
    - name: Format check with black
      run: black --check utils/ app/ --line-length=120 || true
    
    - name: Type checking with mypy
      run: mypy utils/ --ignore-missing-imports --no-strict-optional || true
