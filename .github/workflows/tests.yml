name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install cryptography==41.0.7 --only-binary :all:
        python -m pip install -r requirements-dev.txt
    
    - name: Lint with flake8
      run: |
        python -m flake8 utils/ app/ --count --select=E9,F63,F7,F82 --show-source --statistics --exit-zero
        python -m flake8 utils/ app/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
    
    - name: Run tests with pytest
      run: |
        python -m pytest tests/ -v --tb=short --cov=utils --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        verbose: true
